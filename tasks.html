<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Todo Application</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
        }

        .todo-card {
            max-width: 700px;
            margin: auto;
        }

        .text-strikethrough {
            text-decoration: line-through;
            color: #6c757d;
        }

        .task-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }
    </style>
</head>

<body>

<div class="container py-5">
    <div class="card todo-card shadow-lg">
        <div class="card-body">

            <!-- Header -->
            <h2 class="text-center mb-4">📝 Todo Application</h2>

            <!-- Add Task -->
            <form action="/" method="post" class="row g-2 mb-4">
                <div class="col-9">
                    <input type="text" name="title" class="form-control form-control-lg"
                           placeholder="What needs to be done?" required>
                </div>
                <div class="col-3 d-grid">
                    <button class="btn btn-primary btn-lg">Add</button>
                </div>
            </form>

            <!-- Task list -->
            <div th:if="${#lists.isEmpty(tasks)}" class="text-center text-muted py-4">
                🎉 No tasks yet. Add your first task!
            </div>

            <th:block th:each="task : ${tasks}">
                <div class="card task-card mb-2">
                    <div class="card-body d-flex justify-content-between align-items-center">

                        <div class="d-flex align-items-center gap-3">

                            <input type="checkbox"
                                   class="form-check-input"
                                   th:checked="${task.completed}"
                                   th:onchange="|window.location='@{/ {id}/toggle(id=${task.id})}'|">

                            <span th:text="${task.title}"
                                  th:classappend="${task.completed} ? 'text-strikethrough' : ''">
                            </span>

                            <span th:if="${task.completed}" class="badge bg-success">Completed</span>
                            <span th:unless="${task.completed}" class="badge bg-warning text-dark">Pending</span>

                        </div>

                        <a th:href="@{/{id}/delete(id=${task.id})}"
                           class="btn btn-outline-danger btn-sm">
                            🗑
                        </a>

                    </div>
                </div>
            </th:block>

        </div>
    </div>
</div>

</body>
</html>
